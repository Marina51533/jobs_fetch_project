name: Fetch and Publish Jobs

on:
  schedule:
    - cron: '0 */2 * * *'   # Every 2 hours
  workflow_dispatch:          # Allow manual runs

jobs:
  fetch-jobs:
    name: Run Job Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Node.js dependencies
        run: npm ci

      - name: Restore SQLite database
        uses: dawidd6/action-download-artifact@v6
        with:
          name: jobs-db
          path: data/
          if_no_artifact_found: warn
          workflow_conclusion: success
          search_artifacts: true

      - name: Run database migration
        env:
          DATABASE_PATH: ./data/jobs.db
        run: node src/migrate.js

      - name: Run pipeline
        env:
          DATABASE_PATH: ./data/jobs.db
          QA_BOT_TOKEN: ${{ secrets.QA_BOT_TOKEN }}
          DEV_BOT_TOKEN: ${{ secrets.DEV_BOT_TOKEN }}
          WEB3_CAREER_API_TOKEN: ${{ secrets.WEB3_CAREER_API_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          QA_TOPIC_ID: ${{ secrets.QA_TOPIC_ID }}
          DEV_TOPIC_ID: ${{ secrets.DEV_TOPIC_ID }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
          REVIEW_CHAT_ID: ${{ secrets.REVIEW_CHAT_ID }}
          MAX_SOURCE_JOB_AGE_DAYS: '30'
          CONFIDENCE_THRESHOLD: '0.8'
          FETCH_DELAY_MS: '200'
          PUBLISH_DELAY_MS: '1000'
        run: node src/pipeline/index.js

      - name: Cleanup old database records (if >= 45 days)
        env:
          DATABASE_PATH: ./data/jobs.db
        run: npm run db:cleanup

      - name: Save SQLite database
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jobs-db
          path: data/jobs.db
          retention-days: 90
          overwrite: true
